name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      # Renders images/og/<slug>.jpg from each post title (Chrome + ImageMagick,
      # both preinstalled on ubuntu-latest runners).
      - name: Generate per-post OG images
        run: ruby script/generate-og-images.rb
        env:
          CHROME_BIN: /usr/bin/google-chrome

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
