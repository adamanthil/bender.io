name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      # ImageMagick was removed from the ubuntu-latest runner image, so install
      # it explicitly rather than relying on it being preinstalled. (Chrome,
      # the other dependency, is still preinstalled at /usr/bin/google-chrome.)
      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      # Renders images/og/<slug>.jpg from each post title via headless Chrome,
      # then encodes the JPEG with ImageMagick.
      - name: Generate per-post OG images
        run: ruby script/generate-og-images.rb
        env:
          CHROME_BIN: /usr/bin/google-chrome

      # No --baseurl override: the site is served at the root of the custom
      # domain (bender.io), so baseurl must stay empty. Passing the project
      # path from configure-pages (/bender.io) would prepend it to every
      # relative_url asset, e.g. /bender.io/css/reset.css.
      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
