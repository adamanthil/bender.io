# Site
name: The Gradual Steep
title: The Gradual Steep
description: The personal technology blog of Andrew Bender
tagline: Notes on software and side projects.
url: https://bender.io
lang: en
locale: en_US

# Author / identity (used for meta tags + schema.org JSON-LD)
author:
  name: Andrew Bender
  twitter: adamanthil # X/Twitter handle, no @
  gravatar: adamanthil # Gravatar username -> avatar for OG cards
social: # profile URLs -> schema.org Person.sameAs
  - https://twitter.com/adamanthil
  - https://github.com/adamanthil
  - https://www.linkedin.com/pub/andrew-bender/20/248/a1
  - https://soundcloud.com/adamanthil
  - https://www.youtube.com/@specific.impulse

# Default social-share image (1200x630) for pages without their own
og_image: /images/og-default.png

# Analytics (GoatCounter). Loaded only in production builds; the value is the
# GoatCounter site code -> https://<code>.goatcounter.com
goatcounter: adamanthil

plugins:
  - jekyll-sitemap

# Comments (giscus — GitHub Discussions). Old Disqus threads live in _data/comments.yml.
# repo_id / category_id are filled from the GitHub GraphQL API once the giscus
# app is installed; the comment form only renders when repo_id is set.
giscus:
  repo: adamanthil/bender.io
  repo_id: "MDEwOlJlcG9zaXRvcnkzMjE5MTc4"
  category: Announcements
  category_id: "DIC_kwDOADEe6s4C_8-m"

# Build
permalink: pretty # /YYYY/MM/DD/title/ — must be preserved (links may exist elsewhere)
highlighter: rouge
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Files Jekyll should not copy into the build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .ruby-version
  - twitter-proxy
