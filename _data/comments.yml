- name: Slobodan Miskovic
  date: '2013-09-27T14:03:52Z'
  message: "<p>Code sure balloons up in complexity. Are you aware of any contrib modules
    that would make writing queries such as these more pleasant?</p>"
  replies:
  - name: Andrew Bender
    date: '2013-09-27T15:53:46Z'
    message: "<p>That's a good question. Unfortunately I think much of what makes
      it longer and harder to read is related to the syntax for recursive CTEs since
      you are essentially defining the same query twice. You also aren't allowed to
      use aggregates in them, which makes the other CTE more complicated than it would
      otherwise have to be as well (compare to the earlier example). That is one downside,
      but I think the benefits are worth it.</p>"
- name: Jason Weathered
  date: '2013-09-28T09:52:43Z'
  message: "<p>Great post. Thanks for showing the power of PostgreSQL’s JSON support.</p><p>One
    note: <code>date_part('day', age(now(), dateassigned::timestamp)) as age</code>
    will give the wrong answer when the range is larger than a month. For whole days
    with a date field, you probably want something <code>current_date - dateassigned
    as age</code>. If something like hours was required, <code>date_part('epoch',
    …) / 3600</code> works well.</p>"
  replies:
  - name: Andrew Bender
    date: '2013-09-28T19:38:24Z'
    message: "<p>Thanks! Yeah good call on the age calculation. Those options are
      definitely better in a real situation.</p>"
