- name: Ruslan Talpa
  date: '2015-08-05T08:09:04Z'
  message: '<p>Hi.<br>Any pointers on how to combine in the same query row_to_json
    and json_agg. The idea is to include the parent (client) and the children (tasks)
    of the current item (project). For the query bellow i an error.<br>Thank you</p><p>---<br>ERROR:  column
    "clients.*" must appear in the GROUP BY clause or be used in an aggregate function<br>LINE
    10:   row_to_json(clients.*) as client,<br>^<br>********** Error **********<br>ERROR:
    column "clients.*" must appear in the GROUP BY clause or be used in an aggregate
    function<br>SQL state: 42803<br>Character: 169<br>---</p><p>WITH clients AS (<br>  SELECT
    id, name FROM clients<br>), tasks AS (<br>  SELECT id, project_id, name FROM tasks<br>)</p><p>SELECT<br>  projects.*,<br>  --clients.*,<br>  --tasks.*<br>  row_to_json(clients.*)
    as client,<br>  json_agg(tasks.*) as tasks<br>FROM projects<br>INNER JOIN clients
    ON projects.client_id = <a href="http://clients.id" rel="nofollow noopener" target="_blank"
    title="clients.id">clients.id</a><br>INNER JOIN tasks ON <a href="http://projects.id"
    rel="nofollow noopener" target="_blank" title="projects.id">projects.id</a> =
    tasks.project_id<br>GROUP BY <a href="http://projects.id" rel="nofollow noopener"
    target="_blank" title="projects.id">projects.id</a></p>'
  replies:
  - name: Ruslan Talpa
    date: '2015-08-05T08:36:58Z'
    message: "<p>Found a solution like this, not sure if it's the most optimal considering
      that it might be needed to fetch multiple parents and multiple types of children
      at the same time.</p><p></p><pre><code><br><br>SELECT<br><br>  pg_catalog.count(t),<br><br>
      \ array_to_json(array_agg(row_to_json(t)))::CHARACTER VARYING AS json<br><br>FROM
      (<br><br>    WITH clients AS (<br><br>      SELECT id, name FROM clients<br><br>
      \   )<br><br>    SELECT<br><br>        p.id, p.name, p.client_id, (<br><br>
      \           SELECT array_to_json(array_agg(row_to_json(d)))<br><br>            FROM
      (<br><br>                SELECT id, name, project_id<br><br>                FROM
      tasks<br><br>                WHERE project_id = p.id<br><br>            ) d<br><br>
      \       ) AS tasks,<br><br>        row_to_json(c.*) AS client<br><br>    FROM
      projects AS p<br><br>    INNER JOIN clients AS c ON p.client_id = c.id<br><br>)
      t;<br><br></code></pre>"
