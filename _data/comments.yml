"/2016/09/18/dynamic-pivot-tables-with-json-and-postgresql/":
- name: Damian Rossney
  date: '2016-10-08T22:57:39Z'
  message: <p>Hi, Andrew.  This is a really great discussion of a novel solution to
    a thorny problem (dynamic generation of crosstab queries).  I am curious to know
    what the speed difference would be for a non-trivial dataset.  I expanded your
    sample data for the sale table to 10 million rows (and indexed sale_date) and
    the jsonb_object_agg approach seemed to be a little faster than the crosstab function
    (subjectively speaking, I didn't generate objective data).</p><p>I have two suggestions
    that I think will improve your examples.  First, I would re-use the labels you
    create in your SELECT clauses in your GROUP BY clauses to improve readability.  For
    example, your JSONB example could read:</p><p></p><pre><code><br>WITH month_total
    AS (<br>  SELECT<br>    date_part('year', sale_date) AS year,<br>    to_char(sale_date,
    'Mon') AS month,<br>  COUNT(*) AS total<br>  FROM sale<br>  GROUP BY year, month<br>)<br><br>SELECT<br>  year,<br>  jsonb_object_agg(month,total)
    AS months<br>FROM month_total<br>GROUP BY year<br>ORDER BY year;<br></code></pre><p></p><p>Second,
    I find it distracting that the crosstab and JSONB examples return different numerical
    results.  I think this is just a typo in the GROUP BY clause of the crosstab example.  I
    think the crosstab example would generate more consistent results if written as:</p><p></p><pre><code><br>SELECT
    * FROM crosstab(<br>  $$<br>  SELECT<br>    date_part('year', sale_date) AS year,<br>    date_part('month',
    sale_date) AS month,<br>  COUNT(*)<br>  FROM sale<br>  GROUP BY year, month<br>  ORDER
    BY 1<br>  $$,<br>  $$ SELECT m FROM generate_series(1,12) m $$<br>) AS (<br>  year
    int,<br>  "Jan" int,<br>  "Feb" int,<br>  "Mar" int,<br>  "Apr" int,<br>  "May"
    int,<br>  "Jun" int,<br>  "Jul" int,<br>  "Aug" int,<br>  "Sep" int,<br>  "Oct"
    int,<br>  "Nov" int,<br>  "Dec" int<br>);<br></code></pre><p></p><p>Anyway, great
    post!  I am looking at your approach for a current project.  I think this technique
    has great potential for returning structured data to applications.  If i use it,
    I will definitely link back here with full credit! :)</p>
- name: harshal lagwankar
  date: '2016-10-31T12:03:48Z'
  message: '<p>How can I generate pivot table dynamically in Redshift?</p><p>I have
    following two tables (which may contain varying segment,type and values)</p><p>user_fact<br>-----------<br>Id                                       Type       value<br>9a24cf6f-443c-43dd-abcb-c6c867bde5c7    Site        <a
    href="http://nypost.com" rel="nofollow noopener" target="_blank" title="nypost.com">nypost.com</a><br>2e0c6c42-68ac-43e0-b130-1b986f61a463    device      mobile<br>2e0c6c42-68ac-43e0-b130-1b986f61a463    site        <a
    href="http://realtor.com" rel="nofollow noopener" target="_blank" title="realtor.com">realtor.com</a></p><p>segments<br>2e0c6c42-68ac-43e0-b130-1b986f61a462    segA<br>2e0c6c42-68ac-43e0-b130-1b986f61a463    segA<br>2e0c6c42-68ac-43e0-b130-1b986f61a463    segC<br>2e0c6c42-68ac-43e0-b130-1b986f61a463    segB<br>I
    want my output to look like</p><p>Id                                      SegA
    SegB SegC <a href="http://nypost.com" rel="nofollow noopener" target="_blank"
    title="nypost.com">nypost.com</a> mobile <a href="http://realtor.com" rel="nofollow
    noopener" target="_blank" title="realtor.com">realtor.com</a><br>2e0c6c42-68ac-43e0-b130-1b986f61a463    1    1    0    0          1       1<br>Where
    1 &amp; 0 indicates that particular Id is present in which Segment (binary representation)</p><p>So
    far I created two files with distinct values from both tables for columns Segment,
    Type and Value Segment file contains segB segA segC</p><p>Feature file contains
    <a href="http://nypost.com" rel="nofollow noopener" target="_blank" title="nypost.com">nypost.com</a>
    <a href="http://realtor.com" rel="nofollow noopener" target="_blank" title="realtor.com">realtor.com</a>
    mobile</p><p>Using these two file I want to create query that will treat these
    values as columns and generate pivoted result. Something like</p><p>Select segA,segB....,<a
    href="http://realtor.com" rel="nofollow noopener" target="_blank" title="realtor.com">realtor.com</a>,mobile,...
    from tableA a, tableB b where b.Id = a.Id</p><p>Is there any way where I can use
    Scala or python to generate query dynamically?</p><p>Note: Number of sites can
    be different each time for e.g. today I can have 10 site whereas tomorrow 50 Sites.
    So each time query should generate appropriate number of columns.</p>'
- name: chris marx
  date: '2018-03-01T20:04:41Z'
  message: "<p>Ha, this is brilliant, for most of us, of course all we care about
    is what the response will look like once it's serialized to json. This is perfect!!</p>"
  replies:
  - name: Vikas Prasad
    date: '2020-04-16T05:52:50Z'
    message: '<p>There is just one catch when it comes to json serialisation: the
      ordering of the pivoted items.<br>Although the same can of course be controlled
      as long as we are "inside" DB by using `order by` inside jsonb_obj_agg. The
      problem is, if we serialise this json as it is from application layer as a response
      to some end-point, there is no guarantee that the order would still be maintained,
      because json specification doesn''t guarantee the order inside `{}`</p>'
